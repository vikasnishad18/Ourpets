<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ourpets • Admin</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <div id="root">
      <div id="boot" style="min-height: 100vh; display: grid; place-items: center; padding: 28px;">
        <div class="card" style="grid-column: auto; max-width: 680px; width: 100%;">
          <h3 style="margin: 0 0 8px;">Ourpets Admin</h3>
          <p style="margin: 0;">Loading…</p>
          <p class="notice" style="margin: 10px 0 0;">
            If this stays stuck, check your connection (CDN scripts) and make sure you opened the site via a local server (not <code>file://</code>).
          </p>
        </div>
      </div>
    </div>

    <!-- Supabase REST config (edit for hosted demo; for local use config.local.js) -->
    <script>
      window.OURPETS_SUPABASE_URL = "";
      window.OURPETS_SUPABASE_ANON_KEY = "";
    </script>
    <script src="./config.local.js"></script>

    <!-- React (no build step) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <script>
      (function () {
        const root = document.getElementById("root");
        const boot = document.getElementById("boot");
        if (!root || !boot) return;

        function showHelp(title, message) {
          root.innerHTML =
            '<div style="min-height: 100vh; display: grid; place-items: center; padding: 28px;">' +
            '<div class="card" style="grid-column:auto; max-width: 760px; width: 100%;">' +
            "<h3 style=\"margin:0 0 8px;\">" +
            title +
            "</h3>" +
            '<p class="notice" style="margin:0;">' +
            message +
            "</p>" +
            "</div></div>";
        }

        window.addEventListener("error", (e) => {
          const msg = e && e.message ? e.message : "Unknown error";
          showHelp("Page error", `JavaScript error: <code>${String(msg)}</code>. Open DevTools Console for details.`);
        });

        window.addEventListener("unhandledrejection", (e) => {
          const msg = e && e.reason && e.reason.message ? e.reason.message : e && e.reason ? String(e.reason) : "Unknown error";
          showHelp("Page error", `Unhandled promise rejection: <code>${String(msg)}</code>. Open DevTools Console for details.`);
        });

        setTimeout(() => {
          if (!document.getElementById("boot")) return; // app mounted
          if (!window.React || !window.ReactDOM || !window.Babel) {
            showHelp(
              "CDN scripts not loaded",
              "React/Babel failed to load from <code>unpkg.com</code>. Check your internet / firewall / adblock, then refresh."
            );
            return;
          }
          showHelp(
            "App did not start",
            "If you opened this via <code>file://</code>, start a local server instead: <code>python -m http.server 5173</code> (or run <code>./start.ps1</code>), then open <code>http://localhost:5173/admin.html</code>."
          );
        }, 2200);
      })();
    </script>

    <script type="text/babel" data-presets="react" src="./admin.jsx"></script>
  </body>
</html>

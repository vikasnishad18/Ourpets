<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ourpets • Pet Care Store</title>
    <meta
      name="description"
      content="Ourpets is an adorable, friendly pet care store demo site (React + Supabase form entry)."
    />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%23ff6b9a' d='M23 27c-4 0-7-3-7-7s3-8 7-8 7 4 7 8-3 7-7 7Zm18 0c-4 0-7-3-7-7s3-8 7-8 7 4 7 8-3 7-7 7ZM16 45c-4 0-7-3-7-7s3-8 7-8 7 4 7 8-3 7-7 7Zm32 0c-4 0-7-3-7-7s3-8 7-8 7 4 7 8-3 7-7 7ZM32 56c-10 0-18-6-18-13 0-9 8-16 18-16s18 7 18 16c0 7-8 13-18 13Z'/%3E%3C/svg%3E" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <div id="root">
      <div id="boot" style="min-height: 100vh; display: grid; place-items: center; padding: 28px;">
        <div class="card" style="grid-column: auto; max-width: 680px; width: 100%;">
          <h3 style="margin: 0 0 8px;">Ourpets</h3>
          <p style="margin: 0;">Loading…</p>
          <p class="notice" style="margin: 10px 0 0;">
            If this stays stuck, check your connection (CDN scripts) and make sure you opened the site via a local server (not <code>file://</code>).
          </p>
        </div>
      </div>
    </div>

    <!-- Supabase REST config -->
    <!-- 1) Hosted deployments: edit config.public.js (committed) -->
    <script src="./config.public.js" onerror="console.warn('[Ourpets] Missing config.public.js (set Supabase keys for deployment).')"></script>
    <!-- 2) Fallback defaults (keep empty unless set by config.public.js) -->
    <script>
      window.OURPETS_SUPABASE_URL = window.OURPETS_SUPABASE_URL || "";
      window.OURPETS_SUPABASE_ANON_KEY = window.OURPETS_SUPABASE_ANON_KEY || "";
    </script>
    <!-- 3) Optional local-only overrides (gitignored): config.local.js -->
    <script src="./config.local.js" onerror="console.info('[Ourpets] config.local.js not found (normal on deployed sites).')"></script>

    <!-- React (no build step) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <script>
      (function () {
        const root = document.getElementById("root");
        const boot = document.getElementById("boot");
        if (!root || !boot) return;

        function showHelp(title, message) {
          root.innerHTML =
            '<div style="min-height: 100vh; display: grid; place-items: center; padding: 28px;">' +
            '<div class="card" style="grid-column:auto; max-width: 760px; width: 100%;">' +
            "<h3 style=\"margin:0 0 8px;\">" +
            title +
            "</h3>" +
            '<p class="notice" style="margin:0;">' +
            message +
            "</p>" +
            "</div></div>";
        }

        window.addEventListener("error", (e) => {
          const msg = e && e.message ? e.message : "Unknown error";
          showHelp("Page error", `JavaScript error: <code>${String(msg)}</code>. Open DevTools Console for details.`);
        });

        window.addEventListener("unhandledrejection", (e) => {
          const msg = e && e.reason && e.reason.message ? e.reason.message : e && e.reason ? String(e.reason) : "Unknown error";
          showHelp("Page error", `Unhandled promise rejection: <code>${String(msg)}</code>. Open DevTools Console for details.`);
        });

        // If React/Babel/CDN didn't load, the app never mounts and the page looks blank.
        setTimeout(() => {
          if (!document.getElementById("boot")) return; // app mounted
          if (!window.React || !window.ReactDOM || !window.Babel) {
            showHelp(
              "CDN scripts not loaded",
              "React/Babel failed to load from <code>unpkg.com</code>. Check your internet / firewall / adblock, then refresh."
            );
            return;
          }
          // Common issue: opening from file:// prevents Babel from fetching ./app.jsx.
          showHelp(
            "App did not start",
            "If you opened this via <code>file://</code>, start a local server instead: <code>python -m http.server 5173</code> (or run <code>./start.ps1</code>), then open <code>http://localhost:5173/</code>."
          );
        }, 2200);
      })();
    </script>

    <script type="text/babel" data-presets="react" src="./app.jsx"></script>
  </body>
</html>
